<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Screen Recorder</title>
<meta name="description" content="Quay màn hình trực tiếp trên trình duyệt."/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
  video { width: 100%; background: #000; display: block; }
  button { font-size: 14px; margin: 4px 2px; padding: 6px 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  button svg { width: 16px; height: 16px; }
  #recList { list-style: none; padding: 0; }
  #recList li { border-top: 1px solid #ccc; padding: 8px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #recList video { width: 120px; height: 68px; }
  #statusBar { color: gray; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<main>
  <h1>Screen Recorder</h1>

  <div>
    <video id="previewVideo" autoplay muted playsinline></video>
  </div>

  <div style="margin:8px 0">
    <button id="btnStart" onclick="startRecording()"><i data-lucide="circle"></i> Bắt đầu</button>
    <button id="btnStop" onclick="stopRecording()" disabled><i data-lucide="square"></i> Dừng</button>
    <button id="btnPause" onclick="togglePause()" disabled><i data-lucide="pause"></i> Tạm dừng</button>
    <span id="timerText" style="font-family:monospace;margin-left:8px"></span>
  </div>

  <div id="recordingsWrap" style="display:none">
    <h2>Đã quay (<span id="recCount">0</span>)</h2>
    <ul id="recList"></ul>
  </div>

  <div id="statusBar">Sẵn sàng · Nhấn Bắt đầu để quay màn hình</div>
</main>

<script>
let mediaRecorder=null, stream=null, chunks=[], timerInterval=null;
let seconds=0, paused=false, recIndex=0;
const recordings=[];

async function startRecording(){
  if(stream)stopStream();
  try{
    stream=await navigator.mediaDevices.getDisplayMedia({
      video:{displaySurface:'monitor',frameRate:60,width:{ideal:7680},height:{ideal:4320}},
      audio:{echoCancellation:false,noiseSuppression:false,sampleRate:48000}
    });

    const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
      ?'video/webm;codecs=vp9,opus'
      :MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ?'video/webm;codecs=vp9':'video/webm';

    chunks=[];
    mediaRecorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:16000000,audioBitsPerSecond:320000});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    mediaRecorder.onstop=saveRecording;
    mediaRecorder.start(100);

    document.getElementById('previewVideo').srcObject=stream;
    stream.getVideoTracks()[0].onended=()=>{
      if(mediaRecorder&&mediaRecorder.state!=='inactive')stopRecording();
    };

    seconds=0;paused=false;
    document.getElementById('btnStart').disabled=true;
    document.getElementById('btnStop').disabled=false;
    document.getElementById('btnPause').disabled=false;
    timerInterval=setInterval(()=>{if(!paused){seconds++;updateTimer()}},1000);
    setStatus('Đang quay…');
  }catch(e){
    setStatus('Lỗi: '+(e.message||'Không thể truy cập màn hình'));
  }
}

function stopRecording(){
  if(!mediaRecorder)return;
  mediaRecorder.stop();
  stopStream();
  clearInterval(timerInterval);
  document.getElementById('timerText').textContent='';
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('btnPause').disabled=true;
  document.getElementById('previewVideo').srcObject=null;
  setStatus('Đã dừng · Đang lưu video…');
}

function togglePause(){
  if(!mediaRecorder)return;
  if(paused){
    mediaRecorder.resume();paused=false;
    document.getElementById('btnPause').innerHTML='<i data-lucide="pause"></i> Tạm dừng';
    lucide.createIcons();
    setStatus('Đang quay…');
  }else{
    mediaRecorder.pause();paused=true;
    document.getElementById('btnPause').innerHTML='<i data-lucide="play"></i> Tiếp tục';
    lucide.createIcons();
    setStatus('Đã tạm dừng');
  }
}

function saveRecording(){
  const blob=new Blob(chunks,{type:'video/webm'});
  const url=URL.createObjectURL(blob);
  recIndex++;
  const name=`Quay màn hình ${recIndex}`;
  recordings.unshift({name,url,duration:formatTime(seconds),size:formatSize(blob.size)});
  renderRecordings();
  setStatus(`Đã lưu · ${name} · ${formatTime(seconds)} · ${formatSize(blob.size)}`);
}

function renderRecordings(){
  const wrap=document.getElementById('recordingsWrap');
  const list=document.getElementById('recList');
  wrap.style.display='block';
  document.getElementById('recCount').textContent=recordings.length;
  list.innerHTML='';
  recordings.forEach((r,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`
      <video src="${r.url}" muted></video>
      <span><strong>${r.name}</strong><br><small>${r.duration} · ${r.size}</small></span>
      <button onclick="previewRec(${i})"><i data-lucide="play"></i> Xem</button>
      <button onclick="downloadRec(${i})"><i data-lucide="download"></i> Tải về</button>
      <button onclick="deleteRec(${i})"><i data-lucide="trash-2"></i></button>
    `;
    list.appendChild(li);
  });
  lucide.createIcons();
}

function previewRec(i){
  const v=document.getElementById('previewVideo');
  v.srcObject=null;v.src=recordings[i].url;v.controls=true;v.play();
}

function downloadRec(i){
  const a=document.createElement('a');
  a.href=recordings[i].url;a.download=recordings[i].name+'.webm';a.click();
}

function deleteRec(i){
  URL.revokeObjectURL(recordings[i].url);
  recordings.splice(i,1);
  document.getElementById('recordingsWrap').style.display=recordings.length?'block':'none';
  if(recordings.length)renderRecordings();
  setStatus('Đã xóa video');
}

function stopStream(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
}

function updateTimer(){
  document.getElementById('timerText').textContent='⏺ '+formatTime(seconds);
}

function formatTime(s){
  return Math.floor(s/60).toString().padStart(2,'0')+':'+
         (s%60).toString().padStart(2,'0');
}

function formatSize(b){
  return b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
}

function setStatus(msg){
  document.getElementById('statusBar').textContent=msg;
}

if(!navigator.mediaDevices?.getDisplayMedia){
  document.getElementById('btnStart').disabled=true;
  setStatus('Trình duyệt không hỗ trợ · Dùng Chrome / Edge / Firefox mới nhất');
}

lucide.createIcons();
</script>
</body>
</html>
